<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a79467.mp3" type="audio/mpeg">
    </audio>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="lives">Lives: 3</div>
            <button id="muteBtn" class="control-btn" style="width:40px;height:40px;font-size:14px;">🔊</button>
        </div>
        <div id="game-over" class="hidden">
            <h1>GAME OVER</h1>
            <p>Press SPACE to restart</p>
        </div>
        <div id="win-screen" class="hidden">
            <h1>YOU WIN!</h1>
            <p>Press SPACE to play again</p>
        </div>
        <div id="instructions">
            <p>Arrow Keys to Move | SPACE to Jump</p>
        </div>
        <div id="mobile-controls">
            <button id="leftBtn" class="control-btn">←</button>
            <button id="rightBtn" class="control-btn">→</button>
            <button id="jumpBtn" class="control-btn">↑</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
